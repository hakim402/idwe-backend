version: '3.8'

services:
  db:
    image: postgres:15
    restart: unless-stopped
    env_file:
      - .env
    # --- ADD THIS BLOCK BACK ---
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # REMOVED ports to prevent conflicts with your other projects

  redis:
    image: redis:alpine
    restart: unless-stopped
    # REMOVED ports to prevent conflicts

  web:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    # Optimized Gunicorn for production
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --threads 2
    volumes:
      # Changed to bind mounts so Nginx can access them
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    ports:
      - "8000:8000"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  celery_worker:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    command: celery -A config worker -l info
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    environment:
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

  celery_beat:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media
    environment:
      DB_HOST: db
      DB_PORT: 5432
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis

volumes:
  postgres_data:
  # Removed static_volume and media_volume since we are using bind mounts